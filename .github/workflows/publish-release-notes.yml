name: 发布 GitHub Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: 要补建或重试的版本标签，例如 v0.2.5
        required: true
        type: string

permissions:
  contents: write

jobs:
  publish-release:
    runs-on: ubuntu-latest
    steps:
      - name: 检出完整标签历史
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 确定并校验版本标签
        id: release
        env:
          TAG_INPUT: ${{ inputs.tag }}
        run: |
          TAG="${TAG_INPUT:-$GITHUB_REF_NAME}"
          node scripts/release-notes-check.js "$TAG"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: 创建 GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.release.outputs.tag }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "GitHub Release $TAG 已存在，无需重复创建"
            exit 0
          fi
          gh release create "$TAG" \
            --verify-tag \
            --notes-from-tag \
            --title "Superflow $TAG" \
            --latest
